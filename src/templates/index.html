<!DOCTYPE html>
<html>

<head>
    <title>Customer Churn Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container{
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        form{
            display: grid;
            gap: 15px;
        }

        .form-group{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select{
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button{
            padding: 15px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            opacity: 0.9;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Customer Churn Prediction</h1>

<form method="POST" action="/predict_form">

    <div class="form-group">
        <label>Tenure (Months)</label>
        <input name="tenure" placeholder="Enter tenure" required>
    </div>

    <div class="form-group">
        <label>Monthly Charges</label>
        <input name="MonthlyCharges" placeholder="Enter monthly charges" required>
    </div>

    <div class="form-group">
        <label>Total Charges</label>
        <input name="TotalCharges" placeholder="Enter total charges" required>
    </div>

    <div class="form-group">
        <label>Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="form-group">
        <label>Partner</label>
        <select name="Partner">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-group">
        <label>Dependents</label>
        <select name="Dependents">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-group">
        <label>Phone Service</label>
        <select name="PhoneService">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-group">
        <label>Multiple Lines</label>
        <select name="MultipleLines">
            <option>Yes</option>
            <option>No</option>
            <option>No phone service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Internet Service</label>
        <select name="InternetService">
            <option>Fiber optic</option>
            <option>DSL</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-group">
        <label>Online Security</label>
        <select name="OnlineSecurity">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Online Backup</label>
        <select name="OnlineBackup">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Device Protection</label>
        <select name="DeviceProtection">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Tech Support</label>
        <select name="TechSupport">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Streaming TV</label>
        <select name="StreamingTV">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Streaming Movies</label>
        <select name="StreamingMovies">
            <option>Yes</option>
            <option>No</option>
            <option>No internet service</option>
        </select>
    </div>

    <div class="form-group">
        <label>Contract</label>
        <select name="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
        </select>
    </div>

    <div class="form-group">
        <label>Paperless Billing</label>
        <select name="PaperlessBilling">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <div class="form-group">
        <label>Payment Method</label>
        <select name="PaymentMethod">
            <option>Electronic check</option>
            <option>Credit card (automatic)</option>
            <option>Mailed check</option>
            <option>Bank transfer (automatic)</option>
        </select>
    </div>

    <button type="submit">
        Predict Churn
    </button>

</form>

</div>

</body>

</html>
