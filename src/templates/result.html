<!DOCTYPE html>
<html>

<head>
    <title>Prediction Result</title>

    <style>

        body{
            font-family:Arial;
            max-width:800px;
            margin:auto;
            padding:40px;
            text-align:center;
        }

        h1{
            margin-bottom:40px;
        }

        .result-box{
            padding:30px;
            border-radius:10px;
            margin-top:20px;
        }

        .churn{
            background-color:#ffdddd;
        }

        .no-churn{
            background-color:#ddffdd;
        }

        .prediction{
            font-size:32px;
            font-weight:bold;
        }

        .probability{
            font-size:24px;
            margin-top:20px;
        }

        a{
            display:inline-block;
            margin-top:30px;
            text-decoration:none;
            padding:10px 20px;
            border:1px solid black;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h1>Customer Churn Prediction Result</h1>

<div class="result-box {% if prediction == 1 %}churn{% else %}no-churn{% endif %}">

    <div class="prediction">

        {% if prediction == 1 %}
            Customer Likely To Churn
        {% else %}
            Customer Likely To Stay
        {% endif %}

    </div>

    <div class="probability">

        Churn Probability:
        {{ probability_percent }}%

    </div>

</div>

<a href="/">
    Predict Another Customer
</a>

</body>

</html>
